name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            script: build:binary:linux-x64
            artifact_name: worktreeman-linux-x64
            artifact_path: dist/worktreeman-linux-x64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            script: build:binary:linux-arm64
            artifact_name: worktreeman-linux-arm64
            artifact_path: dist/worktreeman-linux-arm64
          - name: macos-x64
            runner: macos-13
            script: build:binary:macos-x64
            artifact_name: worktreeman-macos-x64
            artifact_path: dist/worktreeman-macos-x64
          - name: macos-arm64
            runner: macos-14
            script: build:binary:macos-arm64
            artifact_name: worktreeman-macos-arm64
            artifact_path: dist/worktreeman-macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun run ${{ matrix.script }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum \
            worktreeman-linux-x64/worktreeman-linux-x64 \
            worktreeman-linux-arm64/worktreeman-linux-arm64 \
            worktreeman-macos-x64/worktreeman-macos-x64 \
            worktreeman-macos-arm64/worktreeman-macos-arm64 \
            > worktreeman-checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/worktreeman-linux-x64/worktreeman-linux-x64
            release-artifacts/worktreeman-linux-arm64/worktreeman-linux-arm64
            release-artifacts/worktreeman-macos-x64/worktreeman-macos-x64
            release-artifacts/worktreeman-macos-arm64/worktreeman-macos-arm64
            release-artifacts/worktreeman-checksums.txt
