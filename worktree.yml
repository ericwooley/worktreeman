env:
  NODE_ENV: development
  APP_NAME: worktree-manager

runtimePorts:
  - SERVER_PORT
  - VITE_PORT
  - DB_PORT
  - REDIS_PORT

derivedEnv:
  DATABASE_URL: postgres://postgres:postgres@localhost:${DB_PORT}/app
  REDIS_URL: redis://localhost:${REDIS_PORT}
  APP_URL: http://localhost:${SERVER_PORT}
  BACKEND_SERVER_PORT: ${SERVER_PORT}

worktrees:
  baseDir: ..

startupCommands:
  - bun install

backgroundCommands:
  Docker services:
    command: docker compose up
  Web dev:
    command: bun run dev
